<header class="navbar">
  <div class="inner">
    <button class="backbtn" [class.show]="showBack" (click)="backClick.emit()">
      <span class="chev">‹</span>
    </button>

    <div class="titleblock">
      <h1>{{ title }}</h1>
      <p class="navsubtitle">{{ subtitle }}</p>
    </div>

    <div class="navactions" [class.hide]="!showActions">
      <button class="navicon" (click)="historyClick.emit()" title="Storico">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <button class="navicon" (click)="infoClick.emit()" title="Info">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
      </button>
    </div>
  </div>
</header>
