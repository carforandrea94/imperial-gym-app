<header class="navbar">
  <div class="inner">
    <button class="backbtn" [class.show]="showBack" (click)="backClick.emit()">
      <span class="chev">‹</span>
    </button>

    <div class="titleblock">
      <h1>{{ title }}</h1>
      <p class="navsubtitle">{{ subtitle }}</p>
    </div>

    <div class="navactions" [class.hide]="!showHistory && !showInfo && !showAnalytics && !showLogout">
      <button class="navicon" *ngIf="showAnalytics" (click)="analyticsClick.emit()" title="Andamento">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/>
          <path d="M18.7 8l-5.1 5.1-3-3L4.7 16"/>
        </svg>
      </button>
      <button class="navicon" *ngIf="showHistory" (click)="historyClick.emit()" title="Storico">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <button class="navicon" *ngIf="showInfo" (click)="infoClick.emit()" title="Info">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
      </button>
      <button class="navicon" *ngIf="showLogout" (click)="logoutClick.emit()" title="Esci">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</header>
