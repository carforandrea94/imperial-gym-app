<p class="sectiontitle">Misurazioni salvate</p>

<div *ngIf="loading" class="history-empty">Caricamento…</div>

<div *ngIf="!loading && errorMsg" class="history-empty">
  {{ errorMsg }}<br>
  <button class="savebtn" style="margin-top:12px" (click)="load()">Riprova</button>
</div>

<div *ngIf="!loading && !errorMsg && rows.length === 0" class="history-empty">
  Nessuna misurazione salvata.<br>Inserisci le tue misure nella sezione Misure per vederle qui.
</div>

<div *ngIf="!loading && rows.length > 0" class="grouplist">
  <div class="daycard press-fx" *ngFor="let r of rows" (click)="goToDetail(r.entry.date)">
    <div class="badge" style="font-size:12px">{{ r.entry.date.slice(8,10) }}/{{ r.entry.date.slice(5,7) }}</div>
    <div class="info">
      <div class="lbl">{{ r.displayDate }}</div>
      <div class="meta">
        <ng-container *ngIf="r.entry.peso">{{ r.entry.peso }} kg</ng-container>
        <ng-container *ngIf="r.pesoDelta !== null">
          &nbsp;·&nbsp;<span [class]="r.pesoDelta! < 0 ? 'delta down' : (r.pesoDelta! > 0 ? 'delta up' : 'delta')">
            {{ r.pesoDeltaText }} kg
          </span>
        </ng-container>
        <ng-container *ngIf="!r.entry.peso">Misurazione salvata</ng-container>
      </div>
    </div>
    <button class="delete-btn" (click)="deleteEntry(r.entry.date, $event)" title="Elimina">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
      </svg>
    </button>
    <span class="chev">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </span>
  </div>
</div>
