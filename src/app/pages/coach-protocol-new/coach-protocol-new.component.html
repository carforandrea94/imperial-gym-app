<p class="sectiontitle">Nuovo protocollo</p>

<div class="infocard method-card" (click)="goToPdfImport()">
  <div class="method-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
  </div>
  <div class="method-info">
    <div class="method-title">Carica 3 PDF</div>
    <div class="method-sub">Scheda allenamento, dieta e integrazione — l'app prova a leggerli e precompila il protocollo</div>
  </div>
  <span class="chev">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
  </span>
</div>

<div class="infocard method-card" (click)="createManual()">
  <div class="method-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
    </svg>
  </div>
  <div class="method-info">
    <div class="method-title">Crea manualmente</div>
    <div class="method-sub">Costruisci scheda e dieta da zero con le schermate guidate</div>
  </div>
  <span class="chev" *ngIf="!creating">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
  </span>
  <span class="chev" *ngIf="creating">…</span>
</div>
