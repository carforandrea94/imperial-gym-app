<div *ngIf="loading" class="history-empty">Caricamento…</div>

<div *ngIf="!loading && errorMsg" class="history-empty">
  {{ errorMsg }}
  <div style="margin-top:12px">
    <button class="confirmbtn cancel" (click)="load()">Riprova</button>
  </div>
</div>

<div *ngIf="!loading && !errorMsg && clients.length === 0" class="history-empty">
  Nessun cliente ancora.<br>Condividi il tuo codice: appariranno qui non appena si registrano.
</div>

<div *ngIf="!loading && !errorMsg && clients.length > 0" class="grouplist">
  <div class="daycard press-fx" *ngFor="let c of clients" (click)="openClient(c)">
    <div class="badge" style="font-size:14px">{{ c.displayName.charAt(0).toUpperCase() }}</div>
    <div class="info">
      <div class="lbl">{{ c.displayName }}</div>
      <div class="meta">{{ c.email }}</div>
    </div>
    <span class="chev">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </span>
  </div>
</div>
