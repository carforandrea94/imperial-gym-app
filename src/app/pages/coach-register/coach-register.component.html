<div class="authscreen">
  <div class="authcard infocard">
    <div class="authtitle">Diventa Coach</div>
    <div class="authsub">Crea il tuo account per gestire i tuoi clienti</div>

    <form #f="ngForm" (ngSubmit)="submit(f)" novalidate>

      <div class="authfield">
        <label>Nome</label>
        <div class="measure-input-wrap">
          <input type="text" autocomplete="name" name="displayName"
            [(ngModel)]="displayName" #nameCtrl="ngModel"
            required minlength="2" placeholder="Il tuo nome" />
        </div>
        <p class="fielderr" *ngIf="nameCtrl.invalid && (nameCtrl.touched || f.submitted)">
          <span *ngIf="nameCtrl.errors?.['required']">Il nome e' obbligatorio.</span>
          <span *ngIf="nameCtrl.errors?.['minlength']">Il nome deve avere almeno 2 caratteri.</span>
        </p>
      </div>

      <div class="authfield">
        <label>Email</label>
        <div class="measure-input-wrap">
          <input type="email" autocomplete="email" name="email"
            [(ngModel)]="email" #emailCtrl="ngModel"
            required email placeholder="nome@esempio.com" />
        </div>
        <p class="fielderr" *ngIf="emailCtrl.invalid && (emailCtrl.touched || f.submitted)">
          <span *ngIf="emailCtrl.errors?.['required']">L'email e' obbligatoria.</span>
          <span *ngIf="emailCtrl.errors?.['email']">Email non valida.</span>
        </p>
      </div>

      <div class="authfield">
        <label>Password</label>
        <div class="measure-input-wrap">
          <input type="password" autocomplete="new-password" name="password"
            [(ngModel)]="password" #passCtrl="ngModel"
            required minlength="6" placeholder="Almeno 6 caratteri" />
        </div>
        <p class="fielderr" *ngIf="passCtrl.invalid && (passCtrl.touched || f.submitted)">
          <span *ngIf="passCtrl.errors?.['required']">La password e' obbligatoria.</span>
          <span *ngIf="passCtrl.errors?.['minlength']">Almeno 6 caratteri.</span>
        </p>
      </div>

      <p class="autherror" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button class="savebtn" type="submit" [disabled]="loading">
        {{ loading ? 'Creazione account…' : 'Crea account coach' }}
      </button>
    </form>

    <a class="authlink" routerLink="/login">Hai gia' un account? Accedi</a>
  </div>
</div>
