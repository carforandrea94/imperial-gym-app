<div *ngIf="!hasAnyDietData" class="history-empty">
  Il tuo coach non ha ancora caricato il tuo piano alimentare.<br>
  Torna a controllare più tardi.
</div>

<ng-container *ngIf="hasAnyDietData">
  <p class="sectiontitle">Piani alimentari</p>

  <div class="grouplist">
    <div class="daycard press-fx diet-card" *ngFor="let card of cards" (click)="openCard(card)">
      <div class="badge">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12c0-2.76 1.12-5.26 2.93-7.07"/>
          <path d="M8 12h8M12 8v8"/>
        </svg>
      </div>
      <div class="info">
        <div class="lbl">{{ card.plan.name }}</div>
        <div class="meta">{{ card.itemCount }} alimenti</div>
      </div>
      <span class="chev">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </span>
    </div>
  </div>
</ng-container>
