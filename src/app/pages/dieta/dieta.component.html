<div *ngIf="!hasAnyDietData" class="history-empty">
  Il tuo coach non ha ancora caricato il tuo piano alimentare.<br>
  Torna a controllare più tardi.
</div>

<ng-container *ngIf="hasAnyDietData">
  <p class="sectiontitle">Piano alimentare</p>

  <div class="grouplist">
    <div class="daycard press-fx diet-card" [class.disabled]="!card.hasData" *ngFor="let card of cards" (click)="openCard(card)">
      <div class="badge" [style.background]="card.mode === 'on' ? 'var(--accent-dim)' : 'rgba(255,255,255,0.06)'"
           [style.color]="card.mode === 'on' ? 'var(--accent)' : 'var(--label-2)'">
        {{ card.mode.toUpperCase() }}
      </div>
      <div class="info">
        <div class="lbl">{{ card.label }}</div>
        <div class="meta">
          {{ card.sub }}
          <ng-container *ngIf="card.hasData">&nbsp;·&nbsp;{{ card.itemCount }} alimenti</ng-container>
          <ng-container *ngIf="!card.hasData">&nbsp;·&nbsp;nessun dato</ng-container>
        </div>
      </div>
      <span class="chev" *ngIf="card.hasData">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </span>
    </div>
  </div>
</ng-container>
