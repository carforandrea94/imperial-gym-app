<body>
  <!-- Liquid Glass — SVG displacement filters (studiato da github.com/Mael-667/Liquid-Glass-CSS) -->
  <svg class="lg-svg" width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <filter id="liquidGlassFilter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.009 0.011" numOctaves="2" seed="8" stitchTiles="stitch" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="55" xChannelSelector="R" yChannelSelector="B"/>
      </filter>
      <filter id="liquidGlassFilterSoft" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="8" stitchTiles="stitch" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="B"/>
      </filter>
    </defs>
  </svg>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
